name: Daily Magazine Scraper

on:
  schedule:
    # 매일 한국 시간(KST) 오전 09:00 (UTC 00:00)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    
    # Needs permission to push back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache pip dependencies
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_BASE_URL: https://stage-is.com
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Bump cache only when public article data changed.
          if ! git diff --quiet data/articles_list.json; then
            # Use timestamp to force CSS cache busting on daily updates
            NEW_VERSION=$(date +"%Y%m%d%H%M")
            sed -i "s/?v=[0-9a-zA-Z]*/?v=$NEW_VERSION/g" index.html
            sed -i "s/?v=[0-9a-zA-Z]*/?v=$NEW_VERSION/g" article.html
            git add index.html article.html
          fi

          git add data/articles_list.json data/articles/*.json sitemap.xml
          [ -f data/failed_queue.json ] && git add data/failed_queue.json
          [ -f data/cost_log.json ] && git add data/cost_log.json
          if compgen -G "data/run_logs/*.json" > /dev/null; then
            git add data/run_logs/*.json
          fi

          if git diff --cached --quiet; then
            echo "No crawler or operational log changes. Skipping commit."
          else
            git commit -m "Operational crawler update [skip ci]"
            git push origin main
          fi
